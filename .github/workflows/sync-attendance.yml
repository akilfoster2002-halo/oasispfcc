name: Sync Attendance

on:
  schedule:
    - cron: '0 * * * *'  # every hour at :00
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger attendance sync
        run: |
          response=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/sync/attendance" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $response"
          echo "Response:"
          cat /tmp/sync_response.json | python3 -m json.tool || cat /tmp/sync_response.json

          if [ "$response" != "200" ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
